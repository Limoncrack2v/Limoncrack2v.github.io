<!DOCTYPE html>
<html>
<head>

    <title>Clase antes de vacaciones</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>
<body >
    <div id="contenedor">
     <div class="elemento"> Sección 1</div>
     <div class="elemento"> Sección 2</div>
     <div class="elemento"> Sección 3</div>
      
    </div> 
    <button id="uno">Click</button>
    <button id="dos">Artista</button>
    <button id="tres">Companero</button>
  
  <style >
    
   

  </style>
   
   <div id="encabezado"></div>

  

  
<script >

  let t=1986;
  const c=3.28;

  let p={"titulo":"Llano en llamas","autor":"Juan Rulfo"}
  console.log(p.autor);

  let d=document.createElement("p");
  d.textContent = "hola";

  document.getElementById("encabezado").appendChild(d);
  
  d.setAttribute("style", "color:blue; font-size: 20px;");

  async function obtenerJSON() {
    const respuesta = await fetch('http://openlibrary.org/subjects/love.json?published_in=1500-1600');
    const datos = await respuesta.json();
    console.log(datos)

    let x=document.createElement("p");
    x.textContent = datos.works[1].title;
    document.getElementById("encabezado").appendChild(x);
    
  }
  let g = document.getElementById("uno");
  g.textContent = "Romeo y Julieta";
  g.addEventListener("click", obtenerJSON);

  async function obtenerArtista() {

    const answer = await fetch('https://www.theaudiodb.com/api/v1/json/123/search.php?s=Bad+Bunny')
    const datos = await answer.json();
    console.log(datos)

    const y = document.createElement("img");
    let x = document.createElement("p");
    x.textContent = datos.artists[0].strBiography;
    y.src = datos.artists[0].strArtistThumb;

    document.getElementById("encabezado").appendChild(x);
    document.getElementById("encabezado").appendChild(y);
  }

    async function obtenerArtistaCom() {

    const answer = await fetch('https://www.theaudiodb.com/api/v1/json/123/search.php?s=AJR')
    const datos = await answer.json();
    console.log(datos)

    const image = document.createElement("img");
    let element = document.createElement("p");
    element.textContent = datos.artists[0].strBiography;
    image.src = datos.artists[0].strArtistThumb;

    document.getElementById("encabezado").appendChild(element);
    document.getElementById("encabezado").appendChild(image);
  }

  let button_dos = document.getElementById("dos");
  button_dos.textContent = "Artista";
  button_dos.addEventListener("click", obtenerArtista);

  let button_tres = document.getElementById("tres");
  button_tres.textContent = "Artista Compañero";
  button_tres.addEventListener("click", obtenerArtistaCom);


  
  
</script>



</body>
</html>
